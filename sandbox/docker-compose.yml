# Local dev sandbox — Postgres only, never production data.
# DB listens on 127.0.0.1:5433 so it is not exposed to your LAN.
#
# Usage (from repo root Fitapp/):
#   cp sandbox/credentials.env.example sandbox/credentials.env
#   docker compose -f sandbox/docker-compose.yml --env-file sandbox/credentials.env up -d
#
# Or from backend/: npm run sandbox:up

services:
  postgres:
    image: postgres:16-alpine
    container_name: walifit-sandbox-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: walifit
      POSTGRES_PASSWORD: ${SANDBOX_DB_PASSWORD:?Set SANDBOX_DB_PASSWORD in credentials.env}
      POSTGRES_DB: walifit_sandbox
    volumes:
      - walifit_sandbox_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U walifit -d walifit_sandbox"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  walifit_sandbox_pgdata:
