name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1" # weekly Monday 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deps:
    name: Dependency audit (pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: pnpm audit (production)
        run: pnpm audit --prod --audit-level high

  codeql:
    name: CodeQL (JS/TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/analyze@v3

  walifit_patterns:
    name: waliFit anti-pattern check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No raw MMKV without encryption
        run: |
          if grep -rEn --include="*.ts" --include="*.tsx" "new MMKV\(\)" apps/ 2>/dev/null | grep -v "node_modules"; then
            echo "::error::MMKV instantiated without encryption. Use security/code/mmkv-encrypted.ts pattern."
            exit 1
          fi

      - name: AI SDKs only inside src/waliAI/
        run: |
          if [ -d apps/backend/src ]; then
            BAD=$(grep -rEn --include="*.ts" "from '@anthropic-ai/sdk'\\|from '@google/generative-ai'" apps/backend/src 2>/dev/null | grep -v "src/waliAI/")
            if [ -n "$BAD" ]; then
              echo "$BAD"
              echo "::error::AI SDKs imported outside src/waliAI/. All AI calls must go through the WaliAI service."
              exit 1
            fi
          fi

      - name: No Supabase auth in middleware
        run: |
          if grep -rEn --include="*.ts" "supabase\\.auth\\.getUser" apps/backend/ 2>/dev/null | grep -v "node_modules"; then
            echo "::error::Supabase auth.getUser found. Use JWT verify in middleware (security/code/jwt-middleware.ts)."
            exit 1
          fi

      - name: No tokens in plain storage
        run: |
          if grep -rEn --include="*.ts" --include="*.tsx" "MMKV.*setString.*[Tt]oken\\|storage\\(\\)\\.set.*[Tt]oken" apps/mobile/ 2>/dev/null | grep -v "node_modules"; then
            echo "::error::Auth token written to MMKV. Use Keychain (security/code/mmkv-encrypted.ts → setAuthTokens)."
            exit 1
          fi

      - name: No disabled TLS
        run: |
          if grep -rEn --include="*.ts" --include="*.tsx" "rejectUnauthorized\\s*:\\s*false" apps/ 2>/dev/null | grep -v "node_modules"; then
            echo "::error::TLS validation disabled."
            exit 1
          fi

      - name: ATS hardened
        run: |
          if grep -rEn "NSAllowsArbitraryLoads</key>\\s*<true/>" apps/mobile/ios 2>/dev/null; then
            echo "::error::NSAllowsArbitraryLoads enabled in Info.plist."
            exit 1
          fi
          if grep -rEn 'usesCleartextTraffic="true"' apps/mobile/android 2>/dev/null; then
            echo "::error::Cleartext traffic enabled in AndroidManifest."
            exit 1
          fi

      - name: No EXPO_PUBLIC secrets
        run: |
          if [ -f apps/mobile/app.json ] && grep -E "EXPO_PUBLIC_.*(SECRET|API_KEY|PRIVATE)" apps/mobile/app.json 2>/dev/null | grep -vE "PUBLISHABLE"; then
            echo "::error::EXPO_PUBLIC env var contains a secret-like name. EXPO_PUBLIC_* is bundled into the app — anything there is readable by anyone with the build."
            exit 1
          fi

  ai_compliance:
    name: AI compliance test harness
    runs-on: ubuntu-latest
    # Only run when AI prompts change — saves API costs
    if: |
      contains(github.event.head_commit.modified, 'apps/backend/src/waliAI/prompts/') ||
      contains(github.event.head_commit.modified, 'apps/backend/src/waliAI/index.ts') ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run AI compliance harness
        run: pnpm --filter @walifit/backend exec ts-node src/scripts/testAICompliance.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_TEST }}
